<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced JS Objects</title>
</head>

<body>

    <label for="searchkey">Search for</label>
    <input type="text" id="searchBox">
    <button id="btnSearch">Search</button>

    <p id="resultBox">Result will be here...</p>

    <script>

        const firstName = 'Maged';

        const user = {
            firstName: 'Hamdy',
            lastName: 'Ali',
            age: 33,
            "blood-type": 'A+',
            address: {
                country: 'Egypt',
                city: 'Cairo',
                street: 'Ramsis',
                buildingNo: 34000,
                area: 'Ramsis'
            },
            married: true,
            hasKids: true,
            kidsNames: [
                'Mona',
                'Tamer'
            ],
        };

        // Get the full object
        console.log('user', user);

        // Get a specific key inside the object
        console.log(user.firstName);

        // Get a specific key inside the object (Key has special characters)
        console.log(user['blood-type']);

        btnSearch.addEventListener('click', () => {
            const searchKey = searchBox.value;
            console.log(searchKey);

            const result = user[searchKey];

            // Get the full object
            console.log('user', result);

            if (result) resultBox.innerText = result;
            else resultBox.innerText = 'Nothing match your search!!!!';

        })


    </script>

</body>

</html>
